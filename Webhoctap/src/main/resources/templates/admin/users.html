<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Người dùng - Admin - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{background:linear-gradient(160deg,#1a2a4a,#1d4ed8);min-height:100vh;width:240px;position:fixed;top:0;left:0;z-index:100;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 20px;border-radius:8px;margin:2px 10px;transition:.2s;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;text-align:center;}
        .sidebar .section-label{color:rgba(255,255,255,.45);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;padding:12px 20px 4px;}
        .main-content{margin-left:240px;padding:30px;}
        .topbar{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
        .panel{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:24px;}
        .filter-bar{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
        .form-control,.form-select{border-radius:8px;border:1.5px solid #e5e7eb;padding:7px 12px;font-size:.88rem;}
        .table th{font-size:.78rem;text-transform:uppercase;color:#6b7280;}
        .badge-status{font-size:.72rem;padding:4px 10px;border-radius:20px;font-weight:600;}
        .action-btn{font-size:.78rem;padding:4px 12px;border-radius:20px;}
        .user-avatar{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;font-size:.9rem;}
        .avatar-admin{background:#dc2626;}
        .avatar-teacher{background:#0ea5e9;}
        .avatar-student{background:#22c55e;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-shield-alt"></i> Admin Panel</div>
    <div class="section-label">Quản lý</div>
    <a th:href="@{/admin/dashboard}" class="nav-link"><i class="fas fa-tachometer-alt"></i> Bảng điều khiển</a>
    <a th:href="@{/admin/users}" class="nav-link active"><i class="fas fa-users"></i> Người dùng</a>
    <a th:href="@{/admin/courses}" class="nav-link"><i class="fas fa-book-open"></i> Khóa học</a>
    <a th:href="@{/admin/materials}" class="nav-link"><i class="fas fa-file-alt"></i> Học liệu</a>
    <div class="section-label">Tài khoản</div>
    <form method="POST" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="nav-link border-0 w-100 text-start" style="background:none;cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
    </form>
</div>
<div class="main-content">
    <div class="topbar">
        <div><h5 class="mb-0 fw-bold"><i class="fas fa-users text-primary me-2"></i>Quản lý Người dùng</h5>
            <small class="text-muted" th:text="${#lists.size(danhSach)} + ' người dùng'"></small></div>
        <a th:href="@{/admin/users/add}" class="btn btn-primary rounded-pill px-4">
            <i class="fas fa-plus me-1"></i> Thêm người dùng
        </a>
    </div>
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filter bar -->
    <form th:action="@{/admin/users}" method="get" class="filter-bar">
        <div>
            <label class="form-label mb-1 small fw-bold">Tìm kiếm</label>
            <input type="text" name="search" class="form-control" placeholder="Tên hoặc email" style="width:250px;">
        </div>
        <div>
            <label class="form-label mb-1 small fw-bold">Vai trò</label>
            <select name="role" class="form-select" style="width:150px;">
                <option value="">Tất cả</option>
                <option value="Admin">Admin</option>
                <option value="Teacher">Giáo viên</option>
                <option value="Student">Học sinh</option>
            </select>
        </div>
        <button type="submit" class="btn btn-outline-secondary rounded-pill px-3">
            <i class="fas fa-filter me-1"></i> Lọc
        </button>
    </form>

    <div class="panel">
        <div th:if="${#lists.isEmpty(danhSach)}" class="text-center py-5 text-muted">
            <i class="fas fa-users fa-3x mb-3 d-block opacity-25"></i>
            <p>Không có người dùng nào.</p>
        </div>
        <div class="table-responsive" th:if="${!#lists.isEmpty(danhSach)}">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>#</th><th>Người dùng</th><th>Email</th><th>Vai trò</th>
                        <th>Trạng thái</th><th>Ngày tạo</th><th class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user, i : ${danhSach}">
                        <td class="text-muted small" th:text="${i.count}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="user-avatar" 
                                     th:classappend="${user.vaiTro.tenVaiTro == 'Admin' ? 'avatar-admin' : user.vaiTro.tenVaiTro == 'Teacher' ? 'avatar-teacher' : 'avatar-student'}"
                                     th:text="${#strings.substring(user.hoTen, 0, 1)}"></div>
                                <div>
                                    <div class="fw-medium" th:text="${user.hoTen}"></div>
                                    <small class="text-muted" th:text="${'ID: ' + user.maNguoiDung}"></small>
                                </div>
                            </div>
                        </td>
                        <td class="text-muted small" th:text="${user.email}"></td>
                        <td>
                            <span class="badge badge-status" 
                                  th:classappend="${user.vaiTro.tenVaiTro == 'Admin' ? 'bg-danger' : user.vaiTro.tenVaiTro == 'Teacher' ? 'bg-info' : 'bg-success'}"
                                  th:text="${user.vaiTro.tenVaiTro}"></span>
                        </td>
                        <td>
                            <span th:if="${user.trangThai}" class="badge bg-success badge-status">Hoạt động</span>
                            <span th:unless="${user.trangThai}" class="badge bg-secondary badge-status">Bị khóa</span>
                        </td>
                        <td class="text-muted small" th:text="${user.ngayTao != null ? #temporals.format(user.ngayTao,'dd/MM/yyyy') : '—'}"></td>
                        <td class="text-center">
                            <div class="d-flex gap-1 justify-content-center flex-wrap">
                                <a th:href="@{/admin/users/{id}/edit(id=${user.maNguoiDung})}"
                                   class="btn action-btn btn-outline-primary"><i class="fas fa-edit"></i> Sửa</a>
                                <form th:if="${user.trangThai}"
                                      th:action="@{/admin/users/{id}/lock(id=${user.maNguoiDung})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn action-btn btn-outline-danger"
                                            onclick="return confirm('Khóa tài khoản này?')">
                                        <i class="fas fa-lock"></i> Khóa
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
