<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phê duyệt Khóa học - Admin - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{background:linear-gradient(160deg,#1a2a4a,#1d4ed8);min-height:100vh;width:240px;position:fixed;top:0;left:0;z-index:100;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 20px;border-radius:8px;margin:2px 10px;transition:.2s;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;text-align:center;}
        .sidebar .section-label{color:rgba(255,255,255,.45);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;padding:12px 20px 4px;}
        .main-content{margin-left:240px;padding:30px;}
        .topbar{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
        .panel{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:24px;}
        .table th{font-size:.78rem;text-transform:uppercase;color:#6b7280;}
        .badge-status{font-size:.72rem;padding:4px 10px;border-radius:20px;font-weight:600;}
        .action-btn{font-size:.78rem;padding:4px 12px;border-radius:20px;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-shield-alt"></i> Admin Panel</div>
    <div class="section-label">Quản lý</div>
    <a th:href="@{/admin/dashboard}" class="nav-link"><i class="fas fa-tachometer-alt"></i> Bảng điều khiển</a>
    <a th:href="@{/admin/users}" class="nav-link"><i class="fas fa-users"></i> Người dùng</a>
    <a th:href="@{/admin/courses}" class="nav-link active"><i class="fas fa-book-open"></i> Khóa học</a>
    <a th:href="@{/admin/materials}" class="nav-link"><i class="fas fa-file-alt"></i> Học liệu</a>
    <div class="section-label">Tài khoản</div>
    <form method="POST" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="nav-link border-0 w-100 text-start" style="background:none;cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
    </form>
</div>
<div class="main-content">
    <div class="topbar">
        <div><h5 class="mb-0 fw-bold"><i class="fas fa-book-open text-primary me-2"></i>Phê duyệt Khóa học</h5>
            <small class="text-muted" th:text="${choDuyet != null ? #lists.size(choDuyet) : 0} + ' đang chờ duyệt'"></small></div>
    </div>
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Tab chờ duyệt -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-pending">
            Chờ duyệt <span class="badge bg-warning text-dark ms-1" th:text="${choDuyet != null ? #lists.size(choDuyet) : 0}"></span>
        </a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-all">
            Tất cả <span class="badge bg-secondary ms-1" th:text="${tatCa != null ? #lists.size(tatCa) : 0}"></span>
        </a></li>
    </ul>

    <div class="tab-content">
        <!-- Chờ duyệt -->
        <div class="tab-pane fade show active" id="tab-pending">
            <div class="panel">
                <div th:if="${#lists.isEmpty(choDuyet)}" class="text-center text-muted py-5">
                    <i class="fas fa-check-circle fa-3x mb-2 d-block text-success opacity-50"></i>
                    Không có khóa học nào đang chờ duyệt.
                </div>
                <div class="table-responsive" th:if="${!#lists.isEmpty(choDuyet)}">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr><th>Tên khóa học</th><th>Giáo viên</th><th>Ngày gửi</th><th class="text-center">Hành động</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="kh : ${choDuyet}">
                                <td>
                                    <div class="fw-medium" th:text="${kh.tenKhoaHoc}"></div>
                                    <small class="text-muted" th:text="${kh.moTa != null ? #strings.abbreviate(kh.moTa,60) : ''}"></small>
                                </td>
                                <td th:text="${kh.giaoVien.hoTen}"></td>
                                <td class="small" th:text="${kh.ngayGuiDuyet != null ? #temporals.format(kh.ngayGuiDuyet,'dd/MM/yyyy') : '—'}"></td>
                                <td class="text-center">
                                    <div class="d-flex gap-2 justify-content-center">
                                        <!-- Duyệt -->
                                        <form th:action="@{/admin/courses/{id}/approve(id=${kh.maKhoaHoc})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-success action-btn">
                                                <i class="fas fa-check me-1"></i> Duyệt
                                            </button>
                                        </form>
                                        <!-- Từ chối -->
                                        <button type="button" class="btn btn-outline-danger action-btn"
                                                data-bs-toggle="modal" th:data-bs-target="'#modalTuChoi' + ${kh.maKhoaHoc}">
                                            <i class="fas fa-times me-1"></i> Từ chối
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Tất cả -->
        <div class="tab-pane fade" id="tab-all">
            <div class="panel">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr><th>Tên khóa học</th><th>Giáo viên</th><th>Trạng thái</th><th>Ngày tạo</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="kh : ${tatCa}">
                                <td class="fw-medium" th:text="${kh.tenKhoaHoc}"></td>
                                <td th:text="${kh.giaoVien.hoTen}"></td>
                                <td>
                                    <span th:switch="${kh.trangThaiDuyet}">
                                        <span th:case="'Draft'" class="badge bg-secondary badge-status">Draft</span>
                                        <span th:case="'PendingApproval'" class="badge bg-warning text-dark badge-status">Chờ duyệt</span>
                                        <span th:case="'Approved'" class="badge bg-success badge-status">Đã duyệt</span>
                                        <span th:case="'Rejected'" class="badge bg-danger badge-status">Từ chối</span>
                                    </span>
                                </td>
                                <td class="small text-muted" th:text="${#temporals.format(kh.ngayTao,'dd/MM/yyyy')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modals từ chối -->
<div th:each="kh : ${choDuyet}">
    <div class="modal fade" th:id="'modalTuChoi' + ${kh.maKhoaHoc}" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-3">
                <div class="modal-header border-0">
                    <h6 class="modal-title fw-bold">Từ chối khóa học</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/courses/{id}/reject(id=${kh.maKhoaHoc})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="modal-body">
                        <p class="text-muted mb-2" th:text="'Khóa học: ' + ${kh.tenKhoaHoc}"></p>
                        <label class="form-label fw-bold">Lý do từ chối <span class="text-danger">*</span></label>
                        <textarea name="lyDo" class="form-control rounded-3" rows="3"
                                  placeholder="Nhập lý do để giáo viên biết cần chỉnh sửa gì..." required></textarea>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-danger rounded-pill px-4">Xác nhận từ chối</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
