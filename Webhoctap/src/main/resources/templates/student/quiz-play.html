<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Làm bài: ' + ${quiz.tenQuiz} + ' - Webhoctap'">Làm bài</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .quiz-header{background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;padding:20px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
        .quiz-header h5{margin:0;font-weight:700;}
        .timer{background:rgba(255,255,255,.2);border-radius:20px;padding:6px 18px;font-weight:700;font-size:1.1rem;letter-spacing:1px;}
        .timer.warning{background:#ef4444;animation:pulse 1s infinite;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}
        .progress-bar-quiz{background:rgba(255,255,255,.3);height:4px;border-radius:2px;}
        .progress-fill{background:#fff;height:4px;border-radius:2px;transition:.3s;}
        .container-quiz{max-width:780px;margin:0 auto;padding:30px 16px;}
        .q-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:24px;margin-bottom:16px;}
        .q-num-badge{background:#eff6ff;color:#1d4ed8;border-radius:20px;padding:3px 12px;font-size:.8rem;font-weight:700;display:inline-block;margin-bottom:10px;}
        .q-content{font-size:1rem;font-weight:600;color:#111827;margin-bottom:16px;}
        .choice-label{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:2px solid #e5e7eb;cursor:pointer;transition:.2s;margin-bottom:8px;background:#fff;}
        .choice-label:hover{border-color:#1d4ed8;background:#eff6ff;}
        input[type=radio]:checked + .choice-label, .choice-label:has(input[type=radio]:checked){border-color:#1d4ed8;background:#eff6ff;}
        .choice-label input[type=radio]{display:none;}
        .choice-circle{width:28px;height:28px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;background:#f9fafb;}
        .submit-bar{background:#fff;box-shadow:0 -4px 12px rgba(0,0,0,.08);padding:16px 30px;position:sticky;bottom:0;display:flex;align-items:center;justify-content:space-between;}
    </style>
</head>
<body>
<div class="quiz-header">
    <div>
        <h5 th:text="${quiz.tenQuiz}"></h5>
        <div class="progress-bar-quiz mt-2" style="width:300px;">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
    </div>
    <div id="timer" class="timer" th:data-minutes="${quiz.thoiGianLamBai}">
        <i class="fas fa-clock me-1"></i> <span id="timerDisplay">--:--</span>
    </div>
</div>

<form th:action="@{/student/quizzes/{id}/submit(id=${quiz.maQuiz})}" method="post" id="quizForm">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="container-quiz">
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-4">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:each="ch, i : ${cauHois}" class="q-card" th:id="'q-' + ${i.index}">
            <div class="q-num-badge">Câu <span th:text="${i.count}"></span>/<span th:text="${#lists.size(cauHois)}"></span></div>
            <div class="q-content" th:text="${ch.noiDung}"></div>
            <div th:each="lc, j : ${ch.luaChons}">
                <label class="choice-label">
                    <input type="radio"
                           th:name="'dapAn[' + ${ch.maCauHoi} + ']'"
                           th:value="${lc.maLuaChon}"
                           onchange="updateProgress()">
                    <div class="choice-circle" th:text="${#strings.listJoin({'A','B','C','D','E'}, '')[j.index]}"></div>
                    <span th:text="${lc.noiDung}"></span>
                </label>
            </div>
        </div>
    </div>
    <div class="submit-bar">
        <span class="text-muted small" id="answeredCount">Đã trả lời: 0 / <span th:text="${#lists.size(cauHois)}"></span></span>
        <button type="submit" class="btn btn-primary rounded-pill px-5 fw-bold"
                onclick="return confirm('Nộp bài? Bạn không thể thay đổi sau khi nộp.')">
            <i class="fas fa-paper-plane me-2"></i> Nộp bài
        </button>
    </div>
</form>

<script>
    const totalQ = parseInt(document.getElementById('timer').dataset.minutes || '0');
    let seconds = (totalQ || 30) * 60;
    const display = document.getElementById('timerDisplay');
    const timer = document.getElementById('timer');

    function updateTimer() {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        display.textContent = m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
        if (seconds <= 60) timer.classList.add('warning');
        if (seconds <= 0) { document.getElementById('quizForm').submit(); return; }
        seconds--;
        setTimeout(updateTimer, 1000);
    }
    if (totalQ > 0) updateTimer();

    function updateProgress() {
        const answered = document.querySelectorAll('input[type=radio]:checked').length;
        const total = document.querySelectorAll('input[type=radio]').length > 0 ?
            new Set([...document.querySelectorAll('input[type=radio]')].map(r => r.name)).size : 1;
        document.getElementById('answeredCount').innerHTML = 'Đã trả lời: ' + answered + ' / ' + total;
        document.getElementById('progressFill').style.width = (answered / total * 100) + '%';
    }
    updateProgress();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
