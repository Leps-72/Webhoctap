<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử làm bài - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .topbar-nav{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:12px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
        .panel{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:24px;}
        .table th{font-size:.8rem;text-transform:uppercase;color:#6b7280;}
        .score-badge{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;}
        .score-pass{background:#d1fae5;color:#065f46;}
        .score-fail{background:#fee2e2;color:#991b1b;}
    </style>
</head>
<body>
<div class="topbar-nav">
    <div style="font-weight:700;font-size:1.2rem;color:#1a4731;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-graduation-cap text-success"></i> Webhoctap
    </div>
    <div class="d-flex gap-2">
        <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="fas fa-arrow-left me-1"></i> Dashboard
        </a>
        <form method="POST" th:action="@{/logout}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill">Đăng xuất</button>
        </form>
    </div>
</div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0"><i class="fas fa-history text-primary me-2"></i>Lịch sử làm bài</h4>
            <small class="text-muted" th:text="${#lists.size(lichSu)} + ' lần làm bài'"></small>
        </div>
    </div>

    <div class="panel">
        <div th:if="${#lists.isEmpty(lichSu)}" class="text-center py-5 text-muted">
            <i class="fas fa-clipboard-list fa-3x mb-3 d-block opacity-25"></i>
            <p>Bạn chưa làm bài thi nào.</p>
            <a th:href="@{/student/dashboard}" class="btn btn-primary rounded-pill px-4">Khám phá khóa học</a>
        </div>
        <div class="table-responsive" th:if="${!#lists.isEmpty(lichSu)}">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr><th>Điểm</th><th>Tên Quiz</th><th>Khóa học</th><th>Bắt đầu</th><th>Kết thúc</th><th>Thời gian</th><th></th></tr>
                </thead>
                <tbody>
                    <tr th:each="kq : ${lichSu}">
                        <td>
                            <div th:class="${kq.diem >= 5 ? 'score-badge score-pass' : 'score-badge score-fail'}"
                                 th:text="${kq.diem}"></div>
                        </td>
                        <td class="fw-medium" th:text="${kq.quiz.tenQuiz}"></td>
                        <td class="text-muted small" th:text="${kq.quiz.khoaHoc != null ? kq.quiz.khoaHoc.tenKhoaHoc : '—'}"></td>
                        <td class="small" th:text="${kq.thoiGianBatDau != null ? #temporals.format(kq.thoiGianBatDau,'dd/MM HH:mm') : '—'}"></td>
                        <td class="small" th:text="${kq.thoiGianKetThuc != null ? #temporals.format(kq.thoiGianKetThuc,'dd/MM HH:mm') : '—'}"></td>
                        <td class="small text-muted">
                            <span th:if="${kq.thoiGianBatDau != null and kq.thoiGianKetThuc != null}"
                                  th:text="${T(java.time.Duration).between(kq.thoiGianBatDau,kq.thoiGianKetThuc).toMinutes()} + ' phút'"></span>
                        </td>
                        <td>
                            <a th:href="@{/student/quizzes/{qid}/result/{kid}(qid=${kq.quiz.maQuiz},kid=${kq.maKetQua})}"
                               class="btn btn-sm btn-outline-primary rounded-pill px-3">
                                <i class="fas fa-eye"></i> Xem
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
