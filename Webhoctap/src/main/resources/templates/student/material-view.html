<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem học liệu - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .topbar-nav{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:12px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
        .panel{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:28px;}
        .info-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;font-size:.9rem;}
        .info-label{color:#6b7280;min-width:100px;}
        .file-frame{width:100%;height:600px;border:none;border-radius:10px;background:#f9fafb;}
    </style>
</head>
<body>
<div class="topbar-nav">
    <div style="font-weight:700;font-size:1.2rem;color:#1a4731;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-graduation-cap text-success"></i> Webhoctap
    </div>
    <div class="d-flex gap-2">
        <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="fas fa-arrow-left me-1"></i> Quay lại
        </a>
        <a th:href="@{/student/results}" class="btn btn-outline-info btn-sm rounded-pill">
            <i class="fas fa-history me-1"></i> Lịch sử làm bài
        </a>
    </div>
</div>
<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="panel mb-3">
                <h5 class="fw-bold mb-1" th:text="${hocLieu.tieuDe}"></h5>
                <p class="text-muted" th:text="${hocLieu.moTa ?: 'Không có mô tả.'}"></p>
                <div class="d-flex gap-3 mt-3 flex-wrap">
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-file me-1"></i>Loại file:</span>
                        <span class="badge bg-light text-dark border" th:text="${hocLieu.loaiTep ?: '—'}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-tachometer-alt me-1"></i>Độ khó:</span>
                        <span th:text="${hocLieu.doKho ?: '—'}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-eye me-1"></i>Lượt xem:</span>
                        <span th:text="${hocLieu.luotXem}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-download me-1"></i>Lượt tải:</span>
                        <span th:text="${hocLieu.soLuotTai}"></span>
                    </div>
                </div>
            </div>
            <!-- Preview (nếu là PDF) -->
            <div class="panel" th:if="${hocLieu.loaiTep == 'pdf' and hocLieu.duongDanTep != null}">
                <h6 class="fw-bold mb-3"><i class="fas fa-eye me-2"></i>Xem trước</h6>
                <iframe th:src="${hocLieu.duongDanTep}" class="file-frame"></iframe>
            </div>
            <div class="panel text-center py-5" th:if="${hocLieu.loaiTep != 'pdf' or hocLieu.duongDanTep == null}">
                <i class="fas fa-file-download fa-3x text-muted mb-3 d-block opacity-50"></i>
                <p class="text-muted">Không thể xem trước loại file này.</p>
                <a th:href="@{/student/materials/{id}/download(id=${hocLieu.maHocLieu})}"
                   class="btn btn-success rounded-pill px-4">
                    <i class="fas fa-download me-1"></i> Tải xuống để xem
                </a>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="panel">
                <h6 class="fw-bold mb-3">Thao tác</h6>
                <div class="d-grid gap-2">
                    <a th:href="@{/student/materials/{id}/download(id=${hocLieu.maHocLieu})}"
                       class="btn btn-success rounded-3">
                        <i class="fas fa-download me-1"></i> Tải xuống
                    </a>
                    <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary rounded-3">
                        <i class="fas fa-arrow-left me-1"></i> Quay lại Dashboard
                    </a>
                </div>
                <hr>
                <div class="text-muted small">
                    <p class="mb-1"><i class="fas fa-calendar me-2"></i>
                        Đăng ngày: <span th:text="${#temporals.format(hocLieu.ngayDang,'dd/MM/yyyy')}"></span>
                    </p>
                    <p class="mb-0"><i class="fas fa-user-tie me-2"></i>
                        Giáo viên: <span th:text="${hocLieu.nguoiDung?.hoTen ?: '—'}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
