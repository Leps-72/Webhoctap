<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám phá khóa học - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="fas fa-graduation-cap"></i> Webhoctap
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/student/dashboard}">Khóa học của tôi</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/student/courses/explore}">Khám phá</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> <span sec:authentication="name"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" th:href="@{/profile}">Hồ sơ</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form method="POST" th:action="@{/logout}" style="display:inline;"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="dropdown-item">Đăng xuất</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="bg-light py-4 mb-4">
        <div class="container">
            <h1 class="h3 mb-2">
                <i class="fas fa-search text-primary"></i> Khám phá khóa học
            </h1>
            <p class="text-muted mb-0">Tìm và đăng ký các khóa học mới</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mb-5">
        <!-- Filter Section -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form method="GET" th:action="@{/student/courses/explore}" class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control" name="search" placeholder="Tìm kiếm khóa học...">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="category">
                            <option value="">-- Tất cả danh mục --</option>
                            <option value="programming">Lập trình</option>
                            <option value="design">Thiết kế</option>
                            <option value="business">Kinh doanh</option>
                            <option value="language">Ngôn ngữ</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-search"></i> Tìm kiếm
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Courses Grid -->
        <div class="row g-4">
            <div th:each="khoaHoc : ${tatCa}" class="col-md-6 col-lg-4">
                <div class="card course-card h-100 shadow-sm">
                    <div class="course-image-wrapper">
                        <img th:src="${khoaHoc.anhBia}" alt="Course" class="card-img-top course-image"
                             onerror="this.src='https://via.placeholder.com/300x200'">
                        <div class="course-overlay">
                            <a th:href="@{/student/courses/{id}(id=${khoaHoc.maKhoaHoc})}" 
                               class="btn btn-light btn-sm">
                                <i class="fas fa-info-circle"></i> Chi tiết
                            </a>
                        </div>
                        <div class="position-absolute bottom-0 end-0 p-2">
                            <span class="badge bg-success" th:if="!${#lists.contains(daDangKyIds, khoaHoc.maKhoaHoc)}">
                                <i class="fas fa-plus"></i> Đăng ký
                            </span>
                            <span class="badge bg-primary" th:if="${#lists.contains(daDangKyIds, khoaHoc.maKhoaHoc)}">
                                <i class="fas fa-check"></i> Đã đăng ký
                            </span>
                        </div>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title" th:text="${khoaHoc.tenKhoaHoc}"></h6>
                        <p class="card-text text-muted small text-truncate" th:text="${khoaHoc.moTa}"></p>
                        
                        <div class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <small class="text-muted">
                                    <i class="fas fa-user"></i> <span th:text="${khoaHoc.giaoVien.hoTen}"></span>
                                </small>
                                <small class="text-muted">
                                    <i class="fas fa-star text-warning"></i> 4.5/5
                                </small>
                            </div>
                            <form th:unless="${#lists.contains(daDangKyIds, khoaHoc.maKhoaHoc)}"
                                   th:action="@{/student/courses/{id}/register(id=${khoaHoc.maKhoaHoc})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-primary btn-sm w-100">
                                    <i class="fas fa-plus"></i> Đăng ký ngay
                                </button>
                            </form>
                            <a th:if="${#lists.contains(daDangKyIds, khoaHoc.maKhoaHoc)}"
                               th:href="@{/student/courses/{id}(id=${khoaHoc.maKhoaHoc})}"
                               class="btn btn-success btn-sm w-100">
                                <i class="fas fa-play"></i> Tiếp tục học
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- No Courses Message -->
        <div th:if="${#lists.isEmpty(tatCa)}" class="alert alert-info mt-4">
            <i class="fas fa-info-circle"></i> Không tìm thấy khóa học nào.
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container text-center text-white-50">
            <p>&copy; 2026 Webhoctap. Tất cả quyền được bảo lưu.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
