<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám phá khóa học - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .course-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden;transition:.2s;border:none;}
        .course-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
        .course-img{width:100%;height:160px;object-fit:cover;background:linear-gradient(135deg,#667eea,#764ba2);}
        .course-img-placeholder{width:100%;height:160px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:3rem;}
        .badge-enrolled{position:absolute;top:10px;right:10px;}
        .topbar-nav{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:12px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
        .topbar-nav .brand{font-weight:700;font-size:1.2rem;color:#1a4731;display:flex;align-items:center;gap:8px;}
        .search-bar{display:flex;gap:8px;align-items:center;}
        .search-bar input{border-radius:20px;border:1.5px solid #e5e7eb;padding:7px 16px;width:260px;}
    </style>
</head>
<body>
<!-- Top nav -->
<div class="topbar-nav">
    <div class="brand"><i class="fas fa-graduation-cap text-success"></i> Webhoctap</div>
    <div class="d-flex gap-2 align-items-center">
        <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary btn-sm rounded-pill">
            <i class="fas fa-home me-1"></i> Dashboard
        </a>
        <form method="POST" th:action="@{/logout}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill">Đăng xuất</button>
        </form>
    </div>
</div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Khám phá khóa học</h4>
            <small class="text-muted" th:text="${#lists.size(tatCa)} + ' khóa học đang có'"></small>
        </div>
        <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary rounded-pill">
            <i class="fas fa-arrow-left me-1"></i> Khóa học của tôi
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(tatCa)}" class="text-center py-5 text-muted">
        <i class="fas fa-search fa-3x mb-3 d-block opacity-25"></i>
        <p>Chưa có khóa học nào được công bố.</p>
    </div>

    <div class="row g-4" th:if="${!#lists.isEmpty(tatCa)}">
        <div class="col-md-6 col-lg-4" th:each="kh : ${tatCa}">
            <div class="course-card position-relative">
                <div th:if="${kh.anhBia != null and !#strings.isEmpty(kh.anhBia)}">
                    <img th:src="${kh.anhBia}" class="course-img" alt="Ảnh bìa khóa học">
                </div>
                <div class="course-img-placeholder" th:if="${kh.anhBia == null or #strings.isEmpty(kh.anhBia)}">
                    <i class="fas fa-book-open"></i>
                </div>
                <!-- Badge đã đăng ký -->
                <span class="badge bg-success badge-enrolled" th:if="${daDangKyIds.contains(kh.maKhoaHoc)}">
                    <i class="fas fa-check me-1"></i> Đã đăng ký
                </span>
                <div class="p-3">
                    <h6 class="fw-bold mb-1" th:text="${kh.tenKhoaHoc}"></h6>
                    <p class="text-muted small mb-2" th:text="${kh.moTa != null ? #strings.abbreviate(kh.moTa,80) : 'Chưa có mô tả.'}"></p>
                    <small class="text-muted"><i class="fas fa-chalkboard-user me-1"></i><span th:text="${kh.giaoVien.hoTen}"></span></small>
                    <div class="d-flex gap-2 mt-3">
                        <a th:href="@{/student/courses/{id}(id=${kh.maKhoaHoc})}"
                           class="btn btn-outline-primary btn-sm rounded-pill flex-grow-1">Xem chi tiết</a>
                        <!-- Nút đăng ký (nếu chưa đăng ký) -->
                        <form th:if="${!daDangKyIds.contains(kh.maKhoaHoc)}"
                              th:action="@{/student/courses/{id}/register(id=${kh.maKhoaHoc})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-success btn-sm rounded-pill px-3">
                                <i class="fas fa-plus"></i> Đăng ký
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
