<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả bài thi - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .topbar-nav{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:12px 30px;display:flex;align-items:center;justify-content:space-between;}
        .result-hero{background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;border-radius:16px;padding:40px;text-align:center;margin-bottom:24px;}
        .score-circle{width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.15);border:4px solid rgba(255,255,255,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;}
        .score-value{font-size:2.8rem;font-weight:900;line-height:1;}
        .score-label{font-size:.85rem;opacity:.8;}
        .panel{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:24px;}
        .ans-row{border-radius:10px;padding:12px 16px;margin-bottom:8px;border:2px solid #e5e7eb;}
        .ans-row.correct-answer{border-color:#10b981;background:#f0fdf4;}
        .ans-row.wrong-answer{border-color:#ef4444;background:#fef2f2;}
        .lc-opt{display:flex;gap:8px;align-items:center;padding:6px 10px;border-radius:8px;margin-bottom:4px;font-size:.88rem;}
        .lc-opt.is-correct{background:#d1fae5;font-weight:600;}
    </style>
</head>
<body>
<div class="topbar-nav">
    <div style="font-weight:700;font-size:1.2rem;color:#1a4731;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-graduation-cap text-success"></i> Webhoctap
    </div>
    <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary btn-sm rounded-pill">
        <i class="fas fa-home me-1"></i> Dashboard
    </a>
</div>

<div class="container py-4" style="max-width:800px;">
    <!-- Hero Result -->
    <div class="result-hero">
        <h5 class="mb-3" th:text="${quiz.tenQuiz}"></h5>
        <div class="score-circle">
            <div class="score-value" th:text="${ketQua.diem}"></div>
            <div class="score-label">điểm</div>
        </div>
        <div th:if="${ketQua.diem >= 5}" class="mt-2">
            <i class="fas fa-trophy fa-2x text-warning mb-1 d-block"></i>
            <strong>Chúc mừng! Bạn đã qua môn!</strong>
        </div>
        <div th:unless="${ketQua.diem >= 5}" class="mt-2">
            <i class="fas fa-redo-alt fa-2x text-white mb-1 d-block opacity-75"></i>
            <strong>Cố lên! Hãy thử lại lần sau.</strong>
        </div>
        <div class="d-flex gap-3 justify-content-center mt-3 small opacity-90">
            <span><i class="fas fa-clock me-1"></i>
                Thời gian: <span th:if="${ketQua.thoiGianBatDau != null and ketQua.thoiGianKetThuc != null}"
                                 th:text="${T(java.time.Duration).between(ketQua.thoiGianBatDau,ketQua.thoiGianKetThuc).toMinutes()} + ' phút'"></span>
            </span>
            <span><i class="fas fa-calendar me-1"></i>
                <span th:text="${ketQua.thoiGianKetThuc != null ? #temporals.format(ketQua.thoiGianKetThuc,'dd/MM/yyyy HH:mm') : '—'}"></span>
            </span>
        </div>
    </div>

    <!-- Đáp án chi tiết -->
    <div class="panel mb-3">
        <h6 class="fw-bold mb-3"><i class="fas fa-list-check me-2"></i>Đáp án chi tiết</h6>
        <div th:each="ch, i : ${cauHois}" class="ans-row">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="fw-medium">Câu <span th:text="${i.count}"></span>: <span th:text="${ch.noiDung}"></span></span>
                <small class="text-muted ms-2 text-nowrap" th:text="${ch.diem} + 'đ'"></small>
            </div>
            <div th:each="lc : ${ch.luaChons}">
                <div th:class="${lc.laDapAnDung} ? 'lc-opt is-correct' : 'lc-opt'">
                    <i th:class="${lc.laDapAnDung} ? 'fas fa-check-circle text-success' : 'far fa-circle text-muted'" style="font-size:.75rem;"></i>
                    <span th:text="${lc.noiDung}"></span>
                    <span th:if="${lc.laDapAnDung}" class="badge bg-success ms-auto" style="font-size:.65rem;">Đúng</span>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 justify-content-center">
        <a th:href="@{/student/results}" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="fas fa-history me-1"></i> Lịch sử làm bài
        </a>
        <a th:href="@{/student/dashboard}" class="btn btn-primary rounded-pill px-4">
            <i class="fas fa-home me-1"></i> Về Dashboard
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
