<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài làm - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: linear-gradient(160deg,#1a4731,#2e7d52); min-height:100vh; width:240px; position:fixed; top:0; left:0; z-index:100; padding-top:20px; }
        .sidebar .brand { color:#fff; font-size:1.3rem; font-weight:700; padding:16px 20px; border-bottom:1px solid rgba(255,255,255,.15); display:flex; align-items:center; gap:10px; }
        .sidebar .nav-link { color:rgba(255,255,255,.8); padding:10px 20px; border-radius:8px; margin:2px 10px; transition:.2s; display:flex; align-items:center; gap:10px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background:rgba(255,255,255,.15); color:#fff; }
        .sidebar .nav-link i { width:20px; text-align:center; }
        .sidebar .section-label { color:rgba(255,255,255,.45); font-size:.7rem; text-transform:uppercase; letter-spacing:1px; padding:12px 20px 4px; }
        .main-content { margin-left:240px; padding:30px; }
        .topbar { background: #fff; border-radius:12px; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 24px; position: sticky; top: 0; z-index: 99; }
        .score-box { background: linear-gradient(135deg, #10b981, #059669); color: white; border-radius: 14px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
        .q-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; border-left: 4px solid #3b82f6; }
        .q-content { font-size: 1.05rem; font-weight: 600; margin-bottom: 15px; color: #1f2937; }
        .lc-opt { padding: 12px 16px; border-radius: 8px; border: 1px solid #e5e7eb; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; background: #fff; }
        .lc-opt.is-correct { background: #d1fae5; border-color: #34d399; }
        .lc-opt.is-wrong { background: #fee2e2; border-color: #fca5a5; }
    </style>
</head>
<body class="bg-light">

<!-- Sidebar -->
<div class="sidebar">
    <div class="brand"><i class="fas fa-graduation-cap"></i> Webhoctap</div>
    <div class="section-label">Tổng quan</div>
    <a th:href="@{/teacher/dashboard}" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <div class="section-label">Nội dung</div>
    <a th:href="@{/teacher/courses}" class="nav-link"><i class="fas fa-book-open"></i> Khóa học</a>
    <a th:href="@{/teacher/quizzes}" class="nav-link active"><i class="fas fa-clipboard-list"></i> Quiz</a>
    <a th:href="@{/teacher/materials}" class="nav-link"><i class="fas fa-file-alt"></i> Học liệu</a>
    <div class="section-label">Câu hỏi</div>
    <a th:href="@{/teacher/question-bank}" class="nav-link"><i class="fas fa-database"></i> Ngân hàng câu hỏi</a>
    <div class="section-label">Tài khoản</div>
    <form method="POST" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="nav-link border-0 w-100 text-start" style="background:none;cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
    </form>
</div>

<!-- Main Content -->
<div class="main-content">
        <div class="topbar">
            <h5 class="mb-0 fw-bold"><i class="fas fa-search me-2 text-info"></i> Chi tiết bài làm: <span th:text="${ketQua.hocSinh.hoTen}" class="text-primary"></span></h5>
            <div class="d-flex gap-2">
                <a th:href="@{/teacher/quizzes/{id}/results(id=${quiz.maQuiz})}" class="btn btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left me-1"></i> Quay lại</a>
            </div>
        </div>

        <div class="container-fluid py-4" style="max-width: 900px; margin: 0 auto;">
            <div class="row mb-4">
                <div class="col-md-8">
                    <h4 class="fw-bold mb-1" th:text="${quiz.tenQuiz}"></h4>
                    <p class="text-muted mb-2"><i class="fas fa-user me-1"></i> <span th:text="${ketQua.hocSinh.hoTen}"></span> (<span th:text="${ketQua.hocSinh.email}"></span>)</p>
                    <div class="d-flex gap-3 text-muted small">
                        <span><i class="fas fa-calendar me-1"></i> <span th:text="${ketQua.thoiGianBatDau != null ? #temporals.format(ketQua.thoiGianBatDau,'dd/MM HH:mm') : '—'}"></span></span>
                        <span><i class="fas fa-clock me-1"></i> 
                            <span th:if="${ketQua.thoiGianBatDau != null and ketQua.thoiGianKetThuc != null}"
                                  th:text="${T(java.time.Duration).between(ketQua.thoiGianBatDau,ketQua.thoiGianKetThuc).toMinutes()} + ' phút'"></span>
                        </span>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="score-box">
                        <div style="font-size: 0.9rem; opacity: 0.9; text-transform: uppercase;">Điểm số</div>
                        <div style="font-size: 2.5rem; font-weight: 800; line-height: 1;"><span th:text="${ketQua.diem}"></span></div>
                    </div>
                </div>
            </div>

            <!-- Danh sách câu hỏi và đáp án -->
            <div th:each="ch, i : ${cauHois}" class="q-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="badge bg-primary rounded-pill px-3 py-2">Câu <span th:text="${i.count}"></span></span>
                    <small class="text-muted text-nowrap" th:text="${ch.diem} + 'đ'"></small>
                </div>
                <div class="q-content" th:text="${ch.noiDung}"></div>
                
                <div th:each="lc : ${ch.luaChons}">
                    <div th:with="isSelected=${luaChonDaChon != null and luaChonDaChon.get(ch.maCauHoi) != null and luaChonDaChon.get(ch.maCauHoi).equals(lc.maLuaChon)}"
                         th:class="${lc.laDapAnDung} ? 'lc-opt is-correct' : (${isSelected} ? 'lc-opt is-wrong' : 'lc-opt')">
                        
                        <i th:if="${lc.laDapAnDung}" class="fas fa-check-circle text-success" style="font-size:.9rem;"></i>
                        <i th:if="${isSelected and !lc.laDapAnDung}" class="fas fa-times-circle text-danger" style="font-size:.9rem;"></i>
                        <i th:if="${!lc.laDapAnDung and !isSelected}" class="far fa-circle text-muted" style="font-size:.9rem;"></i>
                        
                        <span th:text="${lc.noiDung}" th:classappend="${isSelected and !lc.laDapAnDung} ? 'text-danger fw-bold' : ''"></span>
                        
                        <div class="ms-auto d-flex gap-1">
                            <span th:if="${isSelected}" class="badge bg-primary" style="font-size:.65rem;"><i class="fas fa-user me-1"></i>HS chọn</span>
                            <span th:if="${lc.laDapAnDung}" class="badge bg-success" style="font-size:.65rem;">Đáp án đúng</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
