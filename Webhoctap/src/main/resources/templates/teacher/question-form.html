<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Sửa câu hỏi' : 'Tạo câu hỏi mới'} + ' - Webhoctap'">Form câu hỏi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{background:linear-gradient(160deg,#1a4731,#2e7d52);min-height:100vh;width:240px;position:fixed;top:0;left:0;z-index:100;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 20px;border-radius:8px;margin:2px 10px;transition:.2s;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;text-align:center;}
        .sidebar .section-label{color:rgba(255,255,255,.45);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;padding:12px 20px 4px;}
        .main-content{margin-left:240px;padding:30px;}
        .topbar{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
        .form-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:32px;max-width:700px;margin:0 auto;}
        .form-label{font-weight:600;font-size:.88rem;color:#374151;}
        .form-control,.form-select{border-radius:8px;border:1.5px solid #e5e7eb;padding:9px 13px;}
        .form-control:focus,.form-select:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.12);}
        .choice-row{display:flex;gap:10px;align-items:center;background:#f9fafb;border-radius:10px;padding:10px 14px;margin-bottom:8px;border:1.5px solid #e5e7eb;transition:.2s;}
        .choice-row:has(input[type=checkbox]:checked){background:#ede9fe;border-color:#7c3aed;}
        .choice-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#7c3aed;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-graduation-cap"></i> Webhoctap</div>
    <div class="section-label">Tổng quan</div>
    <a th:href="@{/teacher/dashboard}" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <div class="section-label">Nội dung</div>
    <a th:href="@{/teacher/courses}" class="nav-link"><i class="fas fa-book-open"></i> Khóa học</a>
    <a th:href="@{/teacher/quizzes}" class="nav-link"><i class="fas fa-clipboard-list"></i> Quiz</a>
    <a th:href="@{/teacher/materials}" class="nav-link"><i class="fas fa-file-alt"></i> Học liệu</a>
    <div class="section-label">Câu hỏi</div>
    <a th:href="@{/teacher/question-bank}" class="nav-link active"><i class="fas fa-database"></i> Ngân hàng câu hỏi</a>
    <div class="section-label">Tài khoản</div>
    <form method="POST" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="nav-link border-0 w-100 text-start" style="background:none;cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
    </form>
</div>
<div class="main-content">
    <div class="topbar">
        <div>
            <h5 class="mb-0 fw-bold" th:text="${isEdit ? 'Sửa câu hỏi ngân hàng' : 'Thêm câu hỏi vào ngân hàng'}"></h5>
            <small class="text-muted">Điền đầy đủ thông tin và đánh dấu đáp án đúng</small>
        </div>
        <a th:href="@{/teacher/question-bank}" class="btn btn-outline-secondary rounded-pill">
            <i class="fas fa-arrow-left me-1"></i> Quay lại
        </a>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="form-card">
        <form th:action="${isEdit ? '/teacher/question-bank/' + cauHoi.maCauHoi + '/edit' : '/teacher/question-bank/new'}"
              th:object="${cauHoiDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Nội dung câu hỏi <span class="text-danger">*</span></label>
                    <textarea th:field="*{noiDung}" class="form-control" rows="3"
                              th:classappend="${#fields.hasErrors('noiDung')} ? 'is-invalid'"
                              placeholder="Nhập câu hỏi thi..."></textarea>
                    <div class="invalid-feedback" th:errors="*{noiDung}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Loại câu hỏi</label>
                    <select th:field="*{loaiCauHoi}" class="form-select">
                        <option value="TracNghiem">Trắc nghiệm</option>
                        <option value="DungSai">Đúng/Sai</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Độ khó</label>
                    <select th:field="*{doKho}" class="form-select">
                        <option value="De">Dễ</option>
                        <option value="TrungBinh">Trung bình</option>
                        <option value="Kho">Khó</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Điểm</label>
                    <input type="number" th:field="*{diem}" class="form-control" step="0.5" min="0.5">
                </div>
                <div class="col-12">
                    <label class="form-label">Chủ đề / Môn học</label>
                    <input type="text" th:field="*{chuDe}" class="form-control"
                           placeholder="VD: Mạng máy tính, Lập trình Java, Toán...">
                </div>
                <div class="col-12">
                    <label class="form-label">Các lựa chọn <span class="text-danger">*</span>
                        <small class="text-muted fw-normal">(Tích vào ô để đánh dấu đáp án đúng)</small>
                    </label>
                    <div th:each="i : ${#numbers.sequence(0,3)}" class="choice-row">
                        <input type="checkbox"
                               th:name="'luaChons[' + ${i} + '].laDapAnDung'"
                               th:checked="${cauHoiDto.luaChons[i] != null and cauHoiDto.luaChons[i].laDapAnDung}"
                               value="true">
                        <input type="text"
                               th:name="'luaChons[' + ${i} + '].noiDung'"
                               th:value="${cauHoiDto.luaChons[i] != null ? cauHoiDto.luaChons[i].noiDung : ''}"
                               class="form-control border-0 bg-transparent"
                               th:placeholder="'Lựa chọn ' + (${i}+1)">
                    </div>
                    <small class="text-muted"><i class="fas fa-info-circle me-1"></i>Phải có ít nhất 1 đáp án đúng.</small>
                </div>
                <div class="col-12 d-flex gap-2 justify-content-end pt-2">
                    <a th:href="@{/teacher/question-bank}" class="btn btn-outline-secondary rounded-pill px-4">Hủy</a>
                    <button type="submit" class="btn rounded-pill px-4 text-white" style="background:#7c3aed;">
                        <i class="fas fa-save me-1"></i>
                        <span th:text="${isEdit ? 'Lưu thay đổi' : 'Thêm vào ngân hàng'}"></span>
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
