<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa câu hỏi - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{background:linear-gradient(160deg,#1a4731,#2e7d52);min-height:100vh;width:240px;position:fixed;top:0;left:0;z-index:100;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 20px;border-radius:8px;margin:2px 10px;transition:.2s;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;text-align:center;}
        .sidebar .section-label{color:rgba(255,255,255,.45);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;padding:12px 20px 4px;}
        .main-content{margin-left:240px;padding:30px;}
        .topbar{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
        .form-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:32px;max-width:640px;margin:0 auto;}
        .form-label{font-weight:600;font-size:.88rem;color:#374151;}
        .form-control,.form-select{border-radius:8px;border:1.5px solid #e5e7eb;padding:9px 13px;}
        .form-control:focus,.form-select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-graduation-cap"></i> Webhoctap</div>
    <div class="section-label">Tổng quan</div>
    <a th:href="@{/teacher/dashboard}" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <div class="section-label">Nội dung</div>
    <a th:href="@{/teacher/courses}" class="nav-link"><i class="fas fa-book-open"></i> Khóa học</a>
    <a th:href="@{/teacher/quizzes}" class="nav-link active"><i class="fas fa-clipboard-list"></i> Quiz</a>
    <a th:href="@{/teacher/materials}" class="nav-link"><i class="fas fa-file-alt"></i> Học liệu</a>
    <div class="section-label">Câu hỏi</div>
    <a th:href="@{/teacher/question-bank}" class="nav-link"><i class="fas fa-database"></i> Ngân hàng câu hỏi</a>
    <div class="section-label">Tài khoản</div>
    <form method="POST" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="nav-link border-0 w-100 text-start" style="background:none;cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
    </form>
</div>
<div class="main-content">
    <div class="topbar">
        <div>
            <h5 class="mb-0 fw-bold"><i class="fas fa-edit text-primary me-2"></i>Sửa câu hỏi</h5>
            <small class="text-muted">Quiz: <span th:text="${quiz.tenQuiz}"></span></small>
        </div>
        <a th:href="@{/teacher/quizzes/{id}/edit(id=${quiz.maQuiz})}" class="btn btn-outline-secondary rounded-pill">
            <i class="fas fa-arrow-left me-1"></i> Quay lại Quiz
        </a>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="form-card">
        <form th:action="@{/teacher/quizzes/{qid}/questions/{cid}/edit(qid=${quiz.maQuiz},cid=${cauHoi.maCauHoi})}"
              th:object="${cauHoiDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Nội dung câu hỏi *</label>
                    <textarea th:field="*{noiDung}" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Loại</label>
                    <select th:field="*{loaiCauHoi}" class="form-select">
                        <option value="TracNghiem">Trắc nghiệm</option>
                        <option value="DungSai">Đúng/Sai</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Độ khó</label>
                    <select th:field="*{doKho}" class="form-select">
                        <option value="De">Dễ</option>
                        <option value="TrungBinh">Trung bình</option>
                        <option value="Kho">Khó</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Điểm</label>
                    <input type="number" th:field="*{diem}" class="form-control" step="0.5" min="0.5">
                </div>
                <div class="col-12">
                    <label class="form-label">Chủ đề</label>
                    <input type="text" th:field="*{chuDe}" class="form-control" placeholder="VD: Chương 1, Syntax...">
                </div>
                <div class="col-12">
                    <label class="form-label">Các lựa chọn (đánh dấu đáp án đúng)</label>
                    <div th:each="i : ${#numbers.sequence(0,3)}" class="d-flex align-items-center gap-2 mb-2">
                        <input type="checkbox" th:name="'luaChons[' + ${i} + '].laDapAnDung'" value="true"
                               th:checked="*{luaChons[__${i}__].laDapAnDung}"
                               class="form-check-input mt-0" style="min-width:18px;min-height:18px;">
                        <input type="text" th:name="'luaChons[' + ${i} + '].noiDung'" 
                               th:value="*{luaChons[__${i}__].noiDung}"
                               class="form-control" th:placeholder="'Lựa chọn ' + (${i}+1)">
                    </div>
                    <small class="text-muted">Để trống các lựa chọn không cần thiết (VD: chỉ cần 2 lựa chọn cho Đúng/Sai).</small>
                </div>
                <div class="col-12 d-flex gap-2 justify-content-end pt-2">
                    <a th:href="@{/teacher/quizzes/{id}/edit(id=${quiz.maQuiz})}" class="btn btn-outline-secondary rounded-pill px-4">Hủy</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">
                        <i class="fas fa-save me-1"></i> Lưu thay đổi
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
