<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Quiz mới - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{background:linear-gradient(160deg,#1a4731,#2e7d52);min-height:100vh;width:240px;position:fixed;top:0;left:0;z-index:100;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 20px;border-radius:8px;margin:2px 10px;transition:.2s;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;text-align:center;}
        .sidebar .section-label{color:rgba(255,255,255,.45);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;padding:12px 20px 4px;}
        .main-content{margin-left:240px;padding:30px;}
        .topbar{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
        .form-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:32px;max-width:640px;margin:0 auto;}
        .form-label{font-weight:600;font-size:.9rem;color:#374151;}
        .form-control,.form-select{border-radius:10px;border:1.5px solid #e5e7eb;padding:10px 14px;}
        .form-control:focus,.form-select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-graduation-cap"></i> Webhoctap</div>
    <div class="section-label">Tổng quan</div>
    <a th:href="@{/teacher/dashboard}" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <div class="section-label">Nội dung</div>
    <a th:href="@{/teacher/courses}" class="nav-link"><i class="fas fa-book-open"></i> Khóa học</a>
    <a th:href="@{/teacher/quizzes}" class="nav-link active"><i class="fas fa-clipboard-list"></i> Quiz</a>
    <a th:href="@{/teacher/materials}" class="nav-link"><i class="fas fa-file-alt"></i> Học liệu</a>
    <div class="section-label">Câu hỏi</div>
    <a th:href="@{/teacher/question-bank}" class="nav-link"><i class="fas fa-database"></i> Ngân hàng câu hỏi</a>
    <div class="section-label">Tài khoản</div>
    <form method="POST" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="nav-link border-0 w-100 text-start" style="background:none;cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
    </form>
</div>
<div class="main-content">
    <div class="topbar">
        <div><h5 class="mb-0 fw-bold"><i class="fas fa-plus-circle text-primary me-2"></i>Tạo Quiz mới</h5></div>
        <a th:href="@{/teacher/quizzes}" class="btn btn-outline-secondary rounded-pill">
            <i class="fas fa-arrow-left me-1"></i> Quay lại
        </a>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="form-card">
        <form th:action="@{/teacher/quizzes/new}" th:object="${quizDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Tên Quiz <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{tenQuiz}" class="form-control"
                           th:classappend="${#fields.hasErrors('tenQuiz')} ? 'is-invalid'"
                           placeholder="VD: Kiểm tra chương 1">
                    <div class="invalid-feedback" th:errors="*{tenQuiz}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Thời gian làm bài (phút)</label>
                    <input type="number" th:field="*{thoiGianLamBai}" class="form-control"
                           th:classappend="${#fields.hasErrors('thoiGianLamBai')} ? 'is-invalid'"
                           min="1" placeholder="30">
                    <div class="invalid-feedback" th:errors="*{thoiGianLamBai}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Gắn vào Khóa học</label>
                    <select th:field="*{maKhoaHoc}" class="form-select">
                        <option value="">-- Không gắn --</option>
                        <option th:each="kh : ${khoaHocs}" th:value="${kh.maKhoaHoc}" th:text="${kh.tenKhoaHoc}"></option>
                    </select>
                </div>
                <div class="col-12 d-flex gap-2 justify-content-end pt-2">
                    <a th:if="${quizDto.maKhoaHoc != null}" th:href="@{/teacher/courses/{id}/edit(id=${quizDto.maKhoaHoc})}" class="btn btn-outline-secondary rounded-pill px-4">Hủy</a>
                    <a th:unless="${quizDto.maKhoaHoc != null}" th:href="@{/teacher/quizzes}" class="btn btn-outline-secondary rounded-pill px-4">Hủy</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">
                        <i class="fas fa-arrow-right me-1"></i> Tiếp theo – Thêm câu hỏi
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
