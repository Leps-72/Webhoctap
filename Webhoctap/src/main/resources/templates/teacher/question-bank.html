<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngân hàng câu hỏi - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{background:linear-gradient(160deg,#1a4731,#2e7d52);min-height:100vh;width:240px;position:fixed;top:0;left:0;z-index:100;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 20px;border-radius:8px;margin:2px 10px;transition:.2s;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;text-align:center;}
        .sidebar .section-label{color:rgba(255,255,255,.45);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;padding:12px 20px 4px;}
        .main-content{margin-left:240px;padding:30px;}
        .topbar{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
        .panel{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:24px;}
        .q-card{border:1.5px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px;background:#fafafa;transition:.2s;}
        .q-card:hover{border-color:#7c3aed;background:#fff;}
        .badge-diff-De{background:#d1fae5;color:#065f46;}
        .badge-diff-TrungBinh{background:#fef3c7;color:#92400e;}
        .badge-diff-Kho{background:#fee2e2;color:#991b1b;}
        .badge-diff{font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:600;}
        .ans-opt{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;background:#f3f4f6;margin-bottom:4px;font-size:.85rem;}
        .ans-opt.correct{background:#d1fae5;}
        .filter-bar{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
        .form-control,.form-select{border-radius:8px;border:1.5px solid #e5e7eb;padding:7px 12px;font-size:.88rem;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-graduation-cap"></i> Webhoctap</div>
    <div class="section-label">Tổng quan</div>
    <a th:href="@{/teacher/dashboard}" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <div class="section-label">Nội dung</div>
    <a th:href="@{/teacher/courses}" class="nav-link"><i class="fas fa-book-open"></i> Khóa học</a>
    <a th:href="@{/teacher/quizzes}" class="nav-link"><i class="fas fa-clipboard-list"></i> Quiz</a>
    <a th:href="@{/teacher/materials}" class="nav-link"><i class="fas fa-file-alt"></i> Học liệu</a>
    <div class="section-label">Câu hỏi</div>
    <a th:href="@{/teacher/question-bank}" class="nav-link active"><i class="fas fa-database"></i> Ngân hàng câu hỏi</a>
    <div class="section-label">Tài khoản</div>
    <form method="POST" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="nav-link border-0 w-100 text-start" style="background:none;cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
    </form>
</div>

<div class="main-content">
    <div class="topbar">
        <div><h5 class="mb-0 fw-bold"><i class="fas fa-database text-purple me-2" style="color:#7c3aed;"></i>Ngân hàng câu hỏi</h5>
            <small class="text-muted" th:text="${#lists.size(cauHois)} + ' câu hỏi'"></small></div>
        <a th:href="@{/teacher/question-bank/new}" class="btn rounded-pill px-4" style="background:#7c3aed;color:#fff;">
            <i class="fas fa-plus me-1"></i> Thêm câu hỏi mới
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filter bar -->
    <form th:action="@{/teacher/question-bank}" method="get" class="filter-bar">
        <div>
            <label class="form-label mb-1 small fw-bold">Chủ đề</label>
            <input type="text" name="chuDe" class="form-control" th:value="${filterChuDe}" placeholder="VD: Mạng máy tính" style="width:200px;">
        </div>
        <div>
            <label class="form-label mb-1 small fw-bold">Độ khó</label>
            <select name="doKho" class="form-select" style="width:140px;">
                <option value="">Tất cả</option>
                <option value="De" th:selected="${filterDoKho == 'De'}">Dễ</option>
                <option value="TrungBinh" th:selected="${filterDoKho == 'TrungBinh'}">Trung bình</option>
                <option value="Kho" th:selected="${filterDoKho == 'Kho'}">Khó</option>
            </select>
        </div>
        <button type="submit" class="btn btn-outline-secondary rounded-pill px-3">
            <i class="fas fa-filter me-1"></i> Lọc
        </button>
        <a th:href="@{/teacher/question-bank}" class="btn btn-light rounded-pill px-3">Xóa lọc</a>
    </form>

    <div th:if="${#lists.isEmpty(cauHois)}" class="panel text-center py-5 text-muted">
        <i class="fas fa-database fa-3x mb-3 d-block opacity-25"></i>
        <p>Ngân hàng câu hỏi trống.</p>
        <a th:href="@{/teacher/question-bank/new}" class="btn rounded-pill px-4" style="background:#7c3aed;color:#fff;">
            <i class="fas fa-plus me-1"></i> Thêm câu hỏi đầu tiên
        </a>
    </div>

    <div th:each="ch, i : ${cauHois}">
        <div class="q-card">
            <div class="d-flex align-items-start gap-3">
                <div style="width:34px;height:34px;border-radius:50%;background:#ede9fe;color:#7c3aed;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;"
                     th:text="${i.count}"></div>
                <div class="flex-grow-1">
                    <div class="fw-medium mb-2" th:text="${ch.noiDung}"></div>
                    <div class="d-flex gap-2 mb-2 flex-wrap">
                        <span class="badge bg-light text-dark border" th:text="${ch.loaiCauHoi}"></span>
                        <span class="badge-diff" th:classappend="'badge-diff-' + ${ch.doKho}"
                              th:text="${ch.doKho == 'De' ? 'Dễ' : (ch.doKho == 'Kho' ? 'Khó' : 'Trung bình')}"></span>
                        <span class="badge bg-light text-dark border" th:if="${ch.chuDe != null}" th:text="'📚 ' + ${ch.chuDe}"></span>
                        <span class="badge bg-light text-dark border" th:text="${ch.diem} + ' điểm'"></span>
                        <span class="badge" style="background:#e0e7ff;color:#4338ca;border:1px solid #c7d2fe;" th:if="${ch.quiz != null}" th:text="'📝 Quiz: ' + ${ch.quiz.tenQuiz}"></span>
                        <span class="badge bg-light text-secondary border" th:if="${ch.quiz == null}"><i class="fas fa-database me-1"></i>Ngân hàng</span>
                    </div>
                    <div th:each="lc : ${ch.luaChons}">
                        <div th:class="${lc.laDapAnDung} ? 'ans-opt correct' : 'ans-opt'">
                            <i th:class="${lc.laDapAnDung} ? 'fas fa-check-circle text-success' : 'far fa-circle text-muted'" style="font-size:.75rem;"></i>
                            <span th:text="${lc.noiDung}"></span>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-1">
                    <a th:href="@{/teacher/question-bank/{id}/edit(id=${ch.maCauHoi})}"
                       class="btn btn-sm btn-outline-primary rounded-pill px-3">
                        <i class="fas fa-edit"></i> Sửa
                    </a>
                    <form th:action="@{/teacher/question-bank/{id}/delete(id=${ch.maCauHoi})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                onclick="return confirm('Xóa câu hỏi này khỏi ngân hàng?')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
