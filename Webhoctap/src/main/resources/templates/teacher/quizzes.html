<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Quiz - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{background:linear-gradient(160deg,#1a4731,#2e7d52);min-height:100vh;width:240px;position:fixed;top:0;left:0;z-index:100;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 20px;border-radius:8px;margin:2px 10px;transition:.2s;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;text-align:center;}
        .sidebar .section-label{color:rgba(255,255,255,.45);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;padding:12px 20px 4px;}
        .main-content{margin-left:240px;padding:30px;}
        .topbar{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
        .card-panel{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:24px;}
        .table th{font-size:.8rem;text-transform:uppercase;color:#6b7280;}
        .badge-status{font-size:.72rem;padding:4px 10px;border-radius:20px;font-weight:600;}
        .action-btn{font-size:.78rem;padding:4px 12px;border-radius:20px;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-graduation-cap"></i> Webhoctap</div>
    <div class="section-label">Tổng quan</div>
    <a th:href="@{/teacher/dashboard}" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <div class="section-label">Nội dung</div>
    <a th:href="@{/teacher/courses}" class="nav-link"><i class="fas fa-book-open"></i> Khóa học</a>
    <a th:href="@{/teacher/quizzes}" class="nav-link active"><i class="fas fa-clipboard-list"></i> Quiz</a>
    <a th:href="@{/teacher/materials}" class="nav-link"><i class="fas fa-file-alt"></i> Học liệu</a>
    <div class="section-label">Câu hỏi</div>
    <a th:href="@{/teacher/question-bank}" class="nav-link"><i class="fas fa-database"></i> Ngân hàng câu hỏi</a>
    <div class="section-label">Tài khoản</div>
    <form method="POST" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="nav-link border-0 w-100 text-start" style="background:none;cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
    </form>
</div>
<div class="main-content">
    <div class="topbar">
        <div><h5 class="mb-0 fw-bold"><i class="fas fa-clipboard-list text-primary me-2"></i>Quản lý Quiz</h5>
            <small class="text-muted" th:text="${#lists.size(quizs)} + ' quiz'"></small></div>
        <a th:href="@{/teacher/quizzes/new}" class="btn btn-primary rounded-pill px-4">
            <i class="fas fa-plus me-1"></i> Tạo quiz mới
        </a>
    </div>
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="card-panel">
        <div th:if="${#lists.isEmpty(quizs)}" class="text-center py-5 text-muted">
            <i class="fas fa-clipboard-list fa-3x mb-3 d-block opacity-25"></i>
            <p>Chưa có quiz nào.</p>
            <a th:href="@{/teacher/quizzes/new}" class="btn btn-primary rounded-pill px-4">
                <i class="fas fa-plus me-1"></i> Tạo quiz đầu tiên
            </a>
        </div>
        <div class="table-responsive" th:if="${!#lists.isEmpty(quizs)}">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr><th>#</th><th>Tên Quiz</th><th>Khóa học</th><th>Thời gian</th><th>Trạng thái</th><th class="text-center">Thao tác</th></tr>
                </thead>
                <tbody>
                    <tr th:each="q, i : ${quizs}">
                        <td class="text-muted small" th:text="${i.count}"></td>
                        <td class="fw-medium" th:text="${q.tenQuiz}"></td>
                        <td class="text-muted small" th:text="${q.khoaHoc != null ? q.khoaHoc.tenKhoaHoc : '—'}"></td>
                        <td th:text="${q.thoiGianLamBai != null ? q.thoiGianLamBai + ' phút' : '—'}"></td>
                        <td>
                            <span th:if="${q.trangThai == 'Published'}" class="badge bg-success badge-status">
                                <i class="fas fa-globe me-1"></i>Published
                            </span>
                            <span th:unless="${q.trangThai == 'Published'}" class="badge bg-secondary badge-status">
                                <i class="fas fa-pencil me-1"></i>Draft
                            </span>
                        </td>
                        <td class="text-center">
                            <div class="d-flex gap-1 justify-content-center flex-wrap">
                                <a th:href="@{/teacher/quizzes/{id}/edit(id=${q.maQuiz})}"
                                   class="btn action-btn btn-outline-primary"><i class="fas fa-edit"></i> Sửa</a>
                                <form th:action="@{/teacher/quizzes/{id}/delete(id=${q.maQuiz})}" method="post" style="display:inline" onsubmit="return confirm('Bạn có chắc chắn muốn xóa Quiz này không?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn action-btn btn-outline-danger">
                                        <i class="fas fa-trash-alt"></i> Xóa
                                    </button>
                                </form>
                                <!-- Publish / Unpublish -->
                                <form th:if="${q.trangThai != 'Published'}"
                                      th:action="@{/teacher/quizzes/{id}/publish(id=${q.maQuiz})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn action-btn btn-outline-success">
                                        <i class="fas fa-globe"></i> Publish
                                    </button>
                                </form>
                                <form th:if="${q.trangThai == 'Published'}"
                                      th:action="@{/teacher/quizzes/{id}/unpublish(id=${q.maQuiz})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn action-btn btn-outline-warning">
                                        <i class="fas fa-pencil"></i> Unpublish
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
