<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Học liệu - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;}
        .sidebar{background:linear-gradient(160deg,#1a4731,#2e7d52);min-height:100vh;width:240px;position:fixed;top:0;left:0;z-index:100;padding-top:20px;}
        .sidebar .brand{color:#fff;font-size:1.3rem;font-weight:700;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 20px;border-radius:8px;margin:2px 10px;transition:.2s;display:flex;align-items:center;gap:10px;}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
        .sidebar .nav-link i{width:20px;text-align:center;}
        .sidebar .section-label{color:rgba(255,255,255,.45);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;padding:12px 20px 4px;}
        .main-content{margin-left:240px;padding:30px;}
        .topbar{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);}
        .panel{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:24px;}
        .file-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
        .badge-status{font-size:.72rem;padding:4px 10px;border-radius:20px;font-weight:600;}
        .table th{font-size:.8rem;text-transform:uppercase;color:#6b7280;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-graduation-cap"></i> Webhoctap</div>
    <div class="section-label">Tổng quan</div>
    <a th:href="@{/teacher/dashboard}" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <div class="section-label">Nội dung</div>
    <a th:href="@{/teacher/courses}" class="nav-link"><i class="fas fa-book-open"></i> Khóa học</a>
    <a th:href="@{/teacher/quizzes}" class="nav-link"><i class="fas fa-clipboard-list"></i> Quiz</a>
    <a th:href="@{/teacher/materials}" class="nav-link active"><i class="fas fa-file-alt"></i> Học liệu</a>
    <div class="section-label">Câu hỏi</div>
    <a th:href="@{/teacher/question-bank}" class="nav-link"><i class="fas fa-database"></i> Ngân hàng câu hỏi</a>
    <div class="section-label">Tài khoản</div>
    <form method="POST" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="nav-link border-0 w-100 text-start" style="background:none;cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
    </form>
</div>
<div class="main-content">
    <div class="topbar">
        <div><h5 class="mb-0 fw-bold"><i class="fas fa-file-alt text-warning me-2"></i>Quản lý Học liệu</h5>
            <small class="text-muted" th:text="${#lists.size(hocLieus)} + ' học liệu'"></small></div>
        <a th:href="@{/teacher/materials/upload}" class="btn btn-warning rounded-pill px-4 text-dark fw-bold">
            <i class="fas fa-upload me-1"></i> Upload học liệu
        </a>
    </div>
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="panel">
        <div th:if="${#lists.isEmpty(hocLieus)}" class="text-center py-5 text-muted">
            <i class="fas fa-file-alt fa-3x mb-3 d-block opacity-25"></i>
            <p>Chưa có học liệu nào.</p>
            <a th:href="@{/teacher/materials/upload}" class="btn btn-warning rounded-pill px-4 text-dark">
                <i class="fas fa-upload me-1"></i> Upload ngay
            </a>
        </div>
        <div class="table-responsive" th:if="${!#lists.isEmpty(hocLieus)}">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr><th>Học liệu</th><th>Loại</th><th>Độ khó</th><th>Trạng thái</th><th>Lượt xem</th><th>Lượt tải</th><th>Ngày đăng</th><th></th></tr>
                </thead>
                <tbody>
                    <tr th:each="hl : ${hocLieus}">
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="file-icon" style="background:#fef3c7;color:#d97706;">
                                    <i class="fas fa-file-pdf" th:if="${hl.loaiTep == 'pdf'}"></i>
                                    <i class="fas fa-file-word" th:if="${hl.loaiTep == 'docx' or hl.loaiTep == 'doc'}"></i>
                                    <i class="fas fa-file-powerpoint" th:if="${hl.loaiTep == 'pptx' or hl.loaiTep == 'ppt'}"></i>
                                    <i class="fas fa-file-alt" th:if="${hl.loaiTep != 'pdf' and hl.loaiTep != 'docx' and hl.loaiTep != 'doc' and hl.loaiTep != 'pptx' and hl.loaiTep != 'ppt'}"></i>
                                </div>
                                <div>
                                    <div class="fw-medium" th:text="${hl.tieuDe}"></div>
                                    <small class="text-muted" th:text="${hl.moTa != null ? #strings.abbreviate(hl.moTa,50) : ''}"></small>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge bg-light text-dark border" th:text="${hl.loaiTep}"></span></td>
                        <td th:text="${hl.doKho ?: '—'}"></td>
                        <td>
                            <span th:switch="${hl.trangThaiDuyet}">
                                <span th:case="'ChoDuyet'" class="badge bg-warning text-dark badge-status">Chờ duyệt</span>
                                <span th:case="'DaDuyet'" class="badge bg-success badge-status">Đã duyệt</span>
                                <span th:case="'TuChoi'" class="badge bg-danger badge-status">Từ chối</span>
                                <span th:case="*" class="badge bg-secondary badge-status" th:text="${hl.trangThaiDuyet}"></span>
                            </span>
                        </td>
                        <td class="text-center" th:text="${hl.luotXem}"></td>
                        <td class="text-center" th:text="${hl.soLuotTai}"></td>
                        <td class="small text-muted" th:text="${#temporals.format(hl.ngayDang,'dd/MM/yyyy')}"></td>
                        <td>
                            <form th:action="@{/teacher/materials/{id}/delete(id=${hl.maHocLieu})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                                        onclick="return confirm('Xóa học liệu này?')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
