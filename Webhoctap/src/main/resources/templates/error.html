<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-center">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle fa-5x text-warning mb-3"></i>
                    <h1 class="display-4 fw-bold mb-2">500</h1>
                    <h2 class="h3 mb-4">Lỗi máy chủ</h2>
                </div>

                <div class="card border-0 shadow-lg">
                    <div class="card-body p-5">
                        <p class="lead text-muted mb-4">
                            Xin lỗi, đã xảy ra lỗi khi xử lý yêu cầu của bạn. 
                            Vui lòng thử lại sau hoặc liên hệ với quản trị viên nếu vấn đề vẫn tiếp diễn.
                        </p>

                        <div class="alert alert-danger mb-4">
                            <i class="fas fa-exclamation-circle"></i>
                            <strong>Chi tiết lỗi:</strong> Đã xảy ra lỗi ngoài dự kiến trong hệ thống.
                        </div>

                        <div class="d-flex gap-3 justify-content-center">
                            <a th:href="@{/}" class="btn btn-primary btn-lg">
                                <i class="fas fa-home"></i> Về trang chủ
                            </a>
                            <a th:href="javascript:location.reload()" class="btn btn-outline-secondary btn-lg">
                                <i class="fas fa-sync"></i> Tải lại
                            </a>
                        </div>
                    </div>
                </div>

                <p class="text-muted mt-4 small">
                    Nếu vấn đề tiếp tục, vui lòng 
                    <a href="mailto:support@webhoctap.com" class="text-decoration-none">liên hệ hỗ trợ</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
