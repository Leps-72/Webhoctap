<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">
                                <i class="fas fa-graduation-cap text-primary"></i> Webhoctap
                            </h2>
                            <p class="text-muted">Đăng nhập vào tài khoản của bạn</p>
                        </div>

                        <!-- Error Messages -->
                        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMsg}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <div th:if="${logoutMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="fas fa-check-circle"></i> <span th:text="${logoutMsg}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Login Form -->
                        <form method="POST" th:action="@{/login}"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control form-control-lg" id="email" 
                                       name="email" placeholder="Nhập email" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Mật khẩu</label>
                                <input type="password" class="form-control form-control-lg" id="password" 
                                       name="matKhau" placeholder="Nhập mật khẩu" required>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember" name="remember-me">
                                <label class="form-check-label" for="remember">
                                    Ghi nhớ tôi
                                </label>
                                <a th:href="@{/forgot-password}" class="float-end text-decoration-none">
                                    Quên mật khẩu?
                                </a>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
                                <i class="fas fa-sign-in-alt"></i> Đăng nhập
                            </button>
                        </form>

                        <hr>

                        <!-- Register Link -->
                        <div class="text-center">
                            <p class="mb-0">Chưa có tài khoản? 
                                <a th:href="@{/register}" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Demo Credentials -->
                <div class="mt-4 p-4 bg-info bg-opacity-10 rounded-3">
                    <h6 class="fw-bold mb-3"><i class="fas fa-lightbulb text-warning"></i> Tài khoản demo</h6>
                    <ul class="list-unstyled small mb-0">
                        <li><strong>Admin:</strong> admin@example.com / password123</li>
                        <li><strong>Teacher:</strong> teacher@example.com / password123</li>
                        <li><strong>Student:</strong> student@example.com / password123</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
