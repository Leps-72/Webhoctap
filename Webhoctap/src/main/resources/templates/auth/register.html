<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Webhoctap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">
                                <i class="fas fa-graduation-cap text-primary"></i> Webhoctap
                            </h2>
                            <p class="text-muted">Tạo tài khoản mới</p>
                        </div>

                        <!-- Error Messages -->
                        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMsg}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Validation Errors -->
                        <div th:if="${#fields.hasErrors('registerDto')}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <div th:each="error : ${#fields.errors('registerDto')}" th:text="${error}"></div>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Register Form -->
                        <form method="POST" th:action="@{/register}" th:object="${registerDto}"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <!-- Full Name -->
                            <div class="mb-3">
                                <label for="hoTen" class="form-label">Họ và tên</label>
                                <input type="text" class="form-control form-control-lg" id="hoTen" 
                                       th:field="*{hoTen}" placeholder="Nhập họ và tên" required>
                                <small class="text-danger" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}"></small>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control form-control-lg" id="email" 
                                       th:field="*{email}" placeholder="Nhập email" required>
                                <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                            </div>

                            <!-- Role Selection -->
                            <div class="mb-3">
                                <label for="vaiTro" class="form-label">Bạn là</label>
                                <select class="form-select form-select-lg" id="vaiTro" th:field="*{vaiTro}" required>
                                    <option value="">-- Chọn vai trò --</option>
                                    <option value="Student">Học sinh / Sinh viên</option>
                                    <option value="Teacher">Giáo viên</option>
                                </select>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label for="matKhau" class="form-label">Mật khẩu</label>
                                <input type="password" class="form-control form-control-lg" id="matKhau" 
                                       th:field="*{matKhau}" placeholder="Nhập mật khẩu (tối thiểu 8 ký tự)" required>
                                <small class="text-danger" th:if="${#fields.hasErrors('matKhau')}" th:errors="*{matKhau}"></small>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-3">
                                <label for="xacNhanMatKhau" class="form-label">Xác nhận mật khẩu</label>
                                <input type="password" class="form-control form-control-lg" id="xacNhanMatKhau" 
                                       th:field="*{xacNhanMatKhau}" placeholder="Xác nhận mật khẩu" required>
                                <small class="text-danger" th:if="${#fields.hasErrors('xacNhanMatKhau')}" th:errors="*{xacNhanMatKhau}"></small>
                            </div>

                            <!-- Terms -->
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    Tôi đồng ý với <a href="#" class="text-decoration-none">điều khoản sử dụng</a> 
                                    và <a href="#" class="text-decoration-none">chính sách riêng tư</a>
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
                                <i class="fas fa-user-plus"></i> Đăng ký
                            </button>
                        </form>

                        <hr>

                        <!-- Login Link -->
                        <div class="text-center">
                            <p class="mb-0">Đã có tài khoản? 
                                <a th:href="@{/login}" class="text-decoration-none fw-bold">Đăng nhập</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
