server.port=8080
spring.application.name=Webhoctap
# C\u1ea5u h\u00ecnh k\u1ebft n\u1ed1i SQL Server
spring.datasource.url=jdbc:sqlserver://LEPS:1433;databaseName=NenTangHocLieu;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# C\u1ea5u h\u00ecnh Hibernate (T\u1ef1 \u0111\u1ed9ng t\u1ea1o b\u1ea3ng t\u1eeb code Java)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Cho phép circular references
spring.main.allow-circular-references=true

# Debug logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG

# Disable DevTools caching
spring.devtools.restart.enabled=false
spring.thymeleaf.cache=false
server.error.include-message=always
server.error.include-trace=always
